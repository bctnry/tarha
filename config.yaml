# Coding Agent Configuration
# Copy this file to config.yaml and fill in your values

# Ollama Configuration
ollama:
  host: "http://localhost:11434"
  model: "glm-5:cloud"

# Zulip Configuration
zulip:
  enabled: false
  site: "https://your-org.zulipchat.com"
  bot_email: "your-bot@your-org.zulipchat.com"
  api_key: "your-api-key"
  
  # Who can interact with the bot
  user_allowlist: []
  
  # Stream message handling: "open", "mention", "allowlist"
  group_policy: "mention"
  
  # Allowed streams (if group_policy is "allowlist")
  stream_allowlist: []

# HTTP Server Configuration  
http:
  enabled: true
  port: 8080
  host: "localhost"

# Agent Configuration
agent:
  max_tokens: 80000
  temperature: 0.7
  max_history: 100