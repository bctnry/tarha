# Tarha Coding Agent Configuration
# Copy to config.yaml and customize.
# Priority: env vars > sys.config > config.yaml > defaults

ollama:
  model: glm-5:cloud
  host: http://localhost:11434
  timeout: 30000

agent:
  max_iterations: 100
  workspace: .

memory:
  max_size: 10000
  consolidate_threshold: 20

session:
  max_messages: 100
  max_context_ratio: 0.85

# Lazy compaction settings
# When enabled (default), context compaction only happens when the LLM
# returns a context overflow error, rather than proactively compacting.
# This maximizes context utilization and avoids unnecessary summarization.
compaction:
  enabled: true           # Enable lazy compaction (true) or use preemptive (false)
  target_ratio: 0.7       # When compacting, keep 70% of messages
  max_retries: 3          # Max compaction retries before giving up

repl:
  no_color: false
