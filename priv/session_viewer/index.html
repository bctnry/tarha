<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Viewer - Coding Agent Debug Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Session Viewer</h1>
            <p class="subtitle">Coding Agent Debug Tool</p>
        </header>

        <div class="config-bar">
            <label for="api-url">API URL:</label>
            <input type="text" id="api-url" value="" placeholder="http://localhost:8080">
            <button id="refresh-btn" class="btn-primary">🔄 Refresh</button>
            <button id="auto-refresh-toggle" class="btn-secondary">Auto: OFF</button>
        </div>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <span class="stat-label">🟢 Active:</span>
                <span class="stat-value" id="active-sessions">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">💾 Saved:</span>
                <span class="stat-value" id="total-sessions">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Last Updated:</span>
                <span class="stat-value" id="last-updated">-</span>
            </div>
        </div>

        <div class="sessions-container" id="sessions-container">
            <div class="loading">Loading sessions...</div>
        </div>

        <div class="session-detail" id="session-detail" style="display: none;">
            <div class="detail-header">
                <h2>Session Details</h2>
                <button id="close-detail" class="btn-secondary">✕ Close</button>
            </div>
            <div class="detail-content" id="detail-content"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
